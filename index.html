<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para una persona linda 💖</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: pink;
  text-align: center;
  overflow: hidden;
}

/* Pantallas */
.pantalla {
  display: none;
  height: 100vh;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

.activa {
  display: flex;
}

/* Botones */
button {
  padding: 15px 30px;
  margin: 10px;
  font-size: 18px;
  border: none;
  border-radius: 30px;
  cursor: pointer;
}

#si {
  background: #ff4d88;
  color: white;
}

#no {
  background: #ff1a66;
  color: white;
  position: absolute;
}

/* Carta */
.sobre {
  width: 250px;
  height: 150px;
  background: red;
  position: relative;
  cursor: pointer;
}

.carta {
  width: 230px;
  height: 130px;
  background: white;
  position: absolute;
  top: 10px;
  left: 10px;
  display: none;
  padding: 10px;
}

/* Corazones */
.corazon {
  position: absolute;
  color: red;
  animation: flotar 3s linear infinite;
}

@keyframes flotar {
  0% {transform: translateY(0);}
  100% {transform: translateY(-100vh);}
}
</style>

</head>
<body>

<div id="inicio" class="pantalla activa">
  <h1>¿Quieres ser mi novi@? 💖</h1>

  <div class="botones">
    <button id="si">Sí 💘</button>
    <button id="no">No 💔</button>
  </div>

</div>
<!-- Pantalla 2 -->
<div class="pantalla" id="carta">
  <h2>Para una persona linda 💖</h2>

  <div class="sobre">
    <div class="carta" id="mensaje">
      💌 Desde que te conocí algo cambió en mí...  
      Me haces sonreír sin razón 😍  
      ¿Te gustaría intentar algo conmigo? 💖
    </div>
  </div>

  <!-- BOTÓN ABRIR -->
  <button onclick="abrirCarta()" id="abrir">Abrir 💌</button>

  <!-- WHATSAPP -->
  <p class="whatsapp">
    Escríbeme 👉 
    <a href="https://wa.me/3102519142" target="_blank">
      57+3102519142 💚
    </a>
  </p>

</div>

<audio id="audio">
  <source src="amor.mp3" type="audio/mpeg">
</audio>

<script>
// Botón NO se mueve
const no = document.getElementById("no");

no.addEventListener("mouseover", mover);
no.addEventListener("touchstart", mover);

function mover() {
  const x = Math.random() * (window.innerWidth - 100);
  const y = Math.random() * (window.innerHeight - 50);
  no.style.left = x + "px";
  no.style.top = y + "px";
}

// Botón SI cambia de pantalla
document.getElementById("si").onclick = () => {
  document.getElementById("inicio").classList.remove("activa");
  document.getElementById("carta").classList.add("activa");
  document.getElementById("audio").play();
  corazones();
};

// Abrir carta
function abrirCarta() {
  document.getElementById("mensaje").style.display = "block";
}

// Corazones flotando
function corazones() {
  setInterval(() => {
    const corazon = document.createElement("div");
    corazon.className = "corazon";
    corazon.innerHTML = "💖";
    corazon.style.left = Math.random() * 100 + "vw";
    corazon.style.fontSize = "20px";
    document.body.appendChild(corazon);

    setTimeout(() => {
      corazon.remove();
    }, 3000);

  }, 300);
}
</script>

</body>
</html>
